<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <title>Babylon.js sample code</title>

    <!-- Babylon.js -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
    <script src="https://tgfwars.github.io/bjsenv/v5/functions.js"></script>
    <script src="https://tgfwars.github.io/bjsenv/v5/setup.js"></script>
    <!-- <script src="common/functions.js"></script>
    <script src="common/setup.js"></script> -->
    <script>
        var cacheBust = Date.now();
        [
            "common/config.js",
            "common/math.js",
            "common/rendering.js",
            "common/difficulty.js",
            "common/student-api.js",
            "common/common.js",
            "aphillip/aphillip.js",
            "studentA/studentA.js",
            "studentB/studentB.js",
            "studentC/studentC.js",
            "studentD/studentD.js"
        ].forEach(function (src) {
            document.write('<script src="' + src + '?v=' + cacheBust + '"><\/script>');
        });
    </script>


    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        var canvas = document.getElementById("renderCanvas");

        var startRenderLoop = function (engine, canvas) {
            engine.runRenderLoop(function () {
                if (sceneToRender && sceneToRender.activeCamera) {
                    sceneToRender.render();
                }
            });
        }

        var engine = null;
        var scene = null;
        var sceneToRender = null;
        var createDefaultEngine = function () { return new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true, disableWebGL2Support: false }); };
        var createScene = async function () {
            // This creates a basic Babylon Scene object (non-mesh)
            var scene = new BABYLON.Scene(engine);

            await setup(scene);
            await setupCommon(scene);
            await setupAPhillip(scene);
            // await setupStudentA(scene);
            // await setupStudentB(scene);
            // await setupStudentC(scene);
            // await setupStudentD(scene);
            //////// Only Add / edit code below (Do not edit above) ////////

            return scene;
        };

        window.initFunction = async function () {
            var asyncEngineCreation = async function () {
                try {
                    return createDefaultEngine();
                } catch (e) {
                    console.log("the available createEngine function failed. Creating the default engine instead");
                    return createDefaultEngine();
                }
            }

            engine = await asyncEngineCreation();
            window.engine = engine;

            const engineOptions = window.engine.getCreationOptions?.();
            if (!engineOptions || engineOptions.audioEngine !== false) {
            }
            if (!engine) throw 'engine should not be null.';
            startRenderLoop(engine, canvas);
            scene = createScene();
            window.scene = scene;
        };

        initFunction().then(() => {
            scene.then(returnedScene => {
                sceneToRender = returnedScene;
            });
        });

        // Resize
        window.addEventListener("resize", function () {
            engine.resize();
        });
        </script>
    </body>
</html>
